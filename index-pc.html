<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a1a2e" />
  
  <link rel="icon" href="favicon.png" type="image/png" />
  
  <title>똑비서 PC</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/style-pc.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    #splash-screen {
      position: fixed; inset: 0; background: #16181d;
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    #splash-logo { width: 420px; height: 420px; animation: splash-pulse 1.8s ease-in-out infinite; }
    @keyframes splash-pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.75; transform:scale(0.96); }
    }
    #login-screen {
      position: fixed; inset: 0; background: #16181d;
      display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9998;
    }
    #login-box {
      width:100%; max-width:340px; padding:40px 28px 36px;
      background:#1e2028; border-radius:20px; box-shadow:0 8px 32px rgba(0,0,0,0.4);
      display:flex; flex-direction:column; gap:14px;
    }
    #login-logo-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:8px; }
    #login-logo { width:216px; height:216px; background:#1e2028; border-radius:12px; }
    #login-title { font-size:20px; font-weight:700; color:#e0e0e0; letter-spacing:1px; }
    #login-box input {
      width:100%; padding:13px 16px; border-radius:10px; border:1.5px solid #2e3240;
      background:#16181d; color:#e0e0e0; font-size:15px; outline:none;
      box-sizing:border-box; transition:border-color 0.2s; font-family:'Noto Sans KR',sans-serif;
    }
    #login-box input:focus { border-color:#7c6ef5; }
    #login-btn {
      width:100%; padding:13px; border-radius:10px; border:none;
      background:#7c6ef5; color:#fff; font-size:16px; font-weight:600; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:background 0.2s; font-family:'Noto Sans KR',sans-serif; margin-top:4px;
    }
    #login-btn:hover  { background:#6a5acd; }
    #login-btn:active { background:#5a4abf; }
    #login-btn:disabled { background:#2e3240; cursor:not-allowed; }
    #login-error { color:#e05c6a; font-size:13px; text-align:center; min-height:16px; line-height:1.4; }
    #login-spinner {
      display:none; width:18px; height:18px;
      border:2px solid rgba(255,255,255,0.3); border-top-color:#fff;
      border-radius:50%; animation:spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body class="pc-layout">
<script>
  if (localStorage.getItem('lightmode') === '1') document.body.classList.add('light-mode');
</script>

<!-- 스플래시 -->
<div id="splash-screen">
  <img id="splash-logo" src="logo.png" alt="똑비서" />
  <script>
    if (localStorage.getItem('lightmode') === '1') document.getElementById('splash-logo').src = 'logo1.png';
  </script>
</div>

<!-- 로그인 -->
<div id="login-screen">
  <div id="login-box">
    <div id="login-logo-wrap">
      <img id="login-logo" src="logo.png" alt="똑비서" />
      <div id="login-title">똑비서</div>
    </div>
    <form id="login-form" autocomplete="off">
      <input type="email" id="login-email" placeholder="이메일" required autocomplete="username" />
      <input type="password" id="login-password" placeholder="비밀번호" required autocomplete="current-password" />
      <div id="login-error"></div>
      <button type="submit" id="login-btn">
        <span id="login-btn-text">로그인</span>
        <span id="login-spinner"></span>
      </button>
    </form>
  </div>
</div>

<!-- ===== 앱: 3열 그리드 ===== -->
<div id="app" style="display:none">

  <!-- ── 좌측: 탭4개 + 달력 ── -->
  <div id="pc-left">

    <!-- 탭 버튼 4개 -->
    <div id="pc-nav-tabs">
      <button class="pc-nav-btn nav-btn active" data-tab="todo" id="nav-todo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="8" y1="14" x2="8.01" y2="14" stroke-width="3"/><line x1="12" y1="14" x2="16" y2="14"/>
          <line x1="8" y1="18" x2="8.01" y2="18" stroke-width="3"/><line x1="12" y1="18" x2="16" y2="18"/>
        </svg>
        <span>할일</span>
      </button>
      <button class="pc-nav-btn nav-btn" data-tab="weekly" id="nav-weekly">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="3" y1="15" x2="21" y2="15"/>
          <line x1="8" y1="10" x2="8" y2="20"/>
        </svg>
        <span>주간</span>
      </button>
      <button class="pc-nav-btn nav-btn" data-tab="storage" id="nav-storage">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 8l2-4h14l2 4"/>
          <rect x="3" y="8" width="18" height="12" rx="1"/>
          <line x1="9" y1="13" x2="15" y2="13"/>
        </svg>
        <span>창고</span>
      </button>
      <button class="pc-nav-btn nav-btn" data-tab="search" id="nav-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span>검색</span>
      </button>
      <button class="pc-nav-btn nav-btn" data-tab="settings" id="nav-settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>설정</span>
      </button>
    </div>

    <!-- 달력 (항상 표시) -->
    <div id="calendar-section">
      <div id="calendar-header">
        <button id="cal-prev" class="cal-nav">&#8249;</button>
        <button id="cal-thismonth-btn" class="cal-thismonth-btn">이번 달</button>
        <div id="cal-title">
          <span id="cal-year" class="cal-year-btn"></span>년
          <span id="cal-month" class="cal-month-btn"></span>월
        </div>
        <button id="cal-next" class="cal-nav">&#8250;</button>
      </div>
      <div id="calendar-weekdays">
        <span class="wd sun">일</span><span class="wd">월</span><span class="wd">화</span>
        <span class="wd">수</span><span class="wd">목</span><span class="wd">금</span><span class="wd sat">토</span>
      </div>
      <div id="calendar-grid"></div>
    </div>

    <!-- 달력 아래 남은 공간 -->
    <div id="pc-left-footer"></div>

  </div><!-- /pc-left -->

  <!-- ── 중앙: 날짜줄 + 할일목록 ── -->
  <div id="pc-center">

    <!-- 날짜줄: 년월일 + 토글 + 추가버튼 -->
    <div id="selected-date-bar">
      <span id="selected-date-label"></span><span id="weather-display" style="order:2;margin-left:16px;font-size:18px;font-weight:500;color:var(--text-secondary);white-space:nowrap;line-height:1;align-self:center;"></span>
      <div id="date-bar-actions" style="visibility:hidden">
        <button id="lightmode-toggle" title="라이트/다크 모드">
          <div class="lm-toggle-track"><div class="lm-toggle-thumb"></div></div>
        </button>
        <!-- JS 호환용, CSS로 숨김 -->
        <button id="cal-toggle-btn" style="display:none">
          <svg id="cal-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
        </button>
        <button id="fab-add">＋</button>
      </div>
    </div>

    <!-- 할일 탭 -->
    <div id="tab-todo" class="tab-content active">
      <div id="todo-list-section">
        <ul id="todo-list"></ul>
      </div>
    </div>

    <!-- 주간 탭 -->
    <div id="tab-weekly" class="tab-content">
      <div id="weekly-header">
        <button id="week-prev" class="week-nav">&#8249;</button>
        <span id="week-range-label"></span>
        <div id="week-header-right">
          <button id="week-important-btn" class="week-filter-btn">중요</button>
          <button id="week-next" class="week-nav">&#8250;</button>
        </div>
      </div>
      <div id="week-day-row-wrap"><div id="week-day-row"></div></div>
      <div id="week-selected-bar"><span id="week-selected-label"></span></div>
      <div id="weekly-list-section"><div id="weekly-todo-list"></div></div>
    </div>

    <!-- 창고 탭 -->
    <div id="tab-storage" class="tab-content">
      <div id="storage-header">
        <span id="storage-header-title">곧 할 일들</span>
      </div>
      <div id="storage-list-section">
        <div id="storage-todo-list"></div>
      </div>
    </div>

    <!-- 검색 탭 -->
    <div id="tab-search" class="tab-content">
      <div id="search-container">
        <div id="search-input-wrap">
          <input type="text" id="search-input" placeholder="검색어를 입력하세요..." />
          <button id="search-clear">✕</button>
        </div>
        <ul id="search-results"></ul>
      </div>
    </div>

  </div><!-- /pc-center -->

  <!-- ── 우측: 모달 표시 영역 ── -->
  <div id="pc-right">
    <div id="pc-right-placeholder">
      <div class="pc-right-empty-icon">✏️</div>
      <div>할일을 선택하세요</div>
    </div>

    <!-- 할일 모달: #pc-right 안에 위치해야 position:absolute가 올바르게 동작 -->
    <div id="modal-overlay" class="hidden">
      <div id="modal-box">
        <div id="modal-header">
          <span id="modal-title-label">할일 추가</span>
          <button id="modal-close">✕</button>
        </div>
        <div id="modal-title-row">
          <input type="text" id="input-title" placeholder="할일을 입력하세요..." autocomplete="off" />
          <label id="detail-toggle-label">
            <input type="checkbox" id="detail-toggle" />
            <span>상세</span>
          </label>
        </div>
        <div id="detail-section" class="hidden">
          <div class="detail-row">
            <label class="detail-label">중요도</label>
            <div id="importance-btns">
              <button class="imp-btn" data-val="0">없음</button>
              <button class="imp-btn" data-val="1">낮음</button>
              <button class="imp-btn" data-val="2">보통</button>
              <button class="imp-btn" data-val="3">높음</button>
            </div>
            <div id="flags-column">
              <label id="weekly-flag-label">
                <input type="checkbox" id="input-weekly-flag" />
                <span>주간</span>
              </label>
              <label id="storage-flag-label">
                <input type="checkbox" id="storage-flag-toggle" />
                <span>창고</span>
              </label>
            </div>
          </div>
          <div class="detail-row">
            <label class="detail-label">메모</label>
            <textarea id="input-memo" placeholder="메모 (선택사항)"></textarea>
          </div>
          <div class="detail-row">
            <label class="detail-label">날짜</label>
            <input type="date" id="input-date" />
          </div>
          <div class="detail-row">
            <label class="detail-label">상기</label>
            <input type="number" id="input-remind" placeholder="0" min="0" max="30" value="0" />
            <span class="detail-unit">일 전</span>
            <button id="repeat-btn" class="repeat-btn" title="반복 설정">🔁 반복</button>
            <label id="checklist-toggle-label">
              <input type="checkbox" id="checklist-toggle" />
              <span>리스트</span>
            </label>
            <button id="checklist-open-btn" class="checklist-open-btn hidden">☑ 리스트</button>
          </div>
        </div>
        <button id="modal-save">저장</button>
      </div>
    </div>

    <!-- 반복 설정 / 체크리스트 / 반복수정: #pc-right 안에서 하단에 표시 -->
    <div id="repeat-overlay" class="hidden">
      <div id="repeat-box">
        <div id="repeat-header">
          <span>반복 설정</span>
          <button id="repeat-modal-close">✕</button>
        </div>
        <div id="rtype-row">
          <button class="rtype-btn active" data-type="none">없음</button>
          <button class="rtype-btn" data-type="daily">매일</button>
          <button class="rtype-btn" data-type="weekly">매주</button>
          <button class="rtype-btn" data-type="monthly">매월</button>
          <button class="rtype-btn" data-type="yearly">매년</button>
          <button class="rtype-btn" data-type="custom">커스텀</button>
        </div>
        <div id="repeat-weekly-wrap" class="repeat-detail hidden">
          <label class="repeat-sub-label">요일 선택</label>
          <div id="repeat-weekday-btns">
            <button class="rday-btn" data-d="0">일</button><button class="rday-btn" data-d="1">월</button>
            <button class="rday-btn" data-d="2">화</button><button class="rday-btn" data-d="3">수</button>
            <button class="rday-btn" data-d="4">목</button><button class="rday-btn" data-d="5">금</button>
            <button class="rday-btn" data-d="6">토</button>
          </div>
        </div>
        <div id="repeat-monthly-wrap" class="repeat-detail hidden">
          <div id="repeat-monthly-mode-row">
            <button class="rmonth-mode-btn active" data-mode="day">N일</button>
            <button class="rmonth-mode-btn" data-mode="week">X째주 Y요일</button>
          </div>
          <div id="repeat-monthly-day-wrap" class="repeat-option">
            <label>매월</label>
            <input type="number" id="repeat-monthly-day" min="1" max="31" placeholder="1" />
            <span>일</span>
          </div>
          <div id="repeat-monthly-week-wrap" class="repeat-option hidden">
            <select id="repeat-monthly-week">
              <option value="1">첫째</option><option value="2">둘째</option>
              <option value="3">셋째</option><option value="4">넷째</option><option value="5">마지막</option>
            </select>
            <select id="repeat-monthly-weekday">
              <option value="0">일요일</option><option value="1">월요일</option><option value="2">화요일</option>
              <option value="3">수요일</option><option value="4">목요일</option><option value="5">금요일</option>
              <option value="6">토요일</option>
            </select>
          </div>
        </div>
        <div id="repeat-yearly-wrap" class="repeat-detail hidden">
          <div class="repeat-option">
            <label>매년</label>
            <select id="repeat-yearly-month">
              <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
              <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
              <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
              <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
            </select>
            <input type="number" id="repeat-yearly-day" min="1" max="31" placeholder="1" />
            <span>일</span>
          </div>
        </div>
        <div id="repeat-custom-wrap" class="repeat-detail hidden">
          <div id="repeat-custom-unit-row" style="margin-bottom:10px;">
            <button class="rmonth-mode-btn rcustom-unit-btn active" data-unit="day">일</button>
            <button class="rmonth-mode-btn rcustom-unit-btn" data-unit="week">주</button>
            <button class="rmonth-mode-btn rcustom-unit-btn" data-unit="month">개월</button>
            <button class="rmonth-mode-btn rcustom-unit-btn" data-unit="year">년</button>
          </div>
          <div class="repeat-option">
            <label>매</label>
            <input type="number" id="repeat-custom-interval" min="2" max="999" placeholder="2" />
            <span id="repeat-custom-unit-label">일마다</span>
          </div>
        </div>
        <div class="repeat-option">
          <label class="repeat-end-label">
            <input type="checkbox" id="repeat-end-toggle" />
            <span>종료일 설정</span>
          </label>
          <div id="repeat-end-date-wrap" class="hidden">
            <input type="date" id="repeat-end-date" />
          </div>
        </div>
        <div id="repeat-footer">
          <button id="repeat-cancel-btn" class="repeat-footer-btn cancel">취소</button>
          <button id="repeat-confirm-btn" class="repeat-footer-btn confirm">확인</button>
        </div>
      </div>
    </div>

    <div id="checklist-overlay" class="hidden">
      <div id="checklist-box">
        <div id="checklist-header">
          <span>체크 리스트</span>
          <button id="checklist-modal-close">✕</button>
        </div>
        <div id="checklist-items"></div>
        <div id="checklist-add-row">
          <input type="text" id="checklist-input" placeholder="" autocomplete="off" />
          <button id="checklist-add-btn">＋</button>
        </div>
        <div id="checklist-footer">
          <button id="checklist-cancel-btn" class="checklist-footer-btn cancel">취소</button>
          <button id="checklist-confirm-btn" class="checklist-footer-btn confirm">확인</button>
        </div>
      </div>
    </div>

    <div id="repeat-edit-overlay" class="hidden">
      <div id="repeat-edit-box">
        <div class="rds-title">반복 일정 수정</div>
        <button class="rds-btn" id="repeat-edit-only">이 날짜만 수정</button>
        <button class="rds-btn" id="repeat-edit-from">이 날짜 이후 모두 수정</button>
        <button class="rds-btn" id="repeat-edit-all">전체 수정</button>
        <button class="rds-btn cancel" id="repeat-edit-cancel">취소</button>
      </div>
    </div>

  </div>

</div><!-- /app -->

<!-- ===== 설정 패널 ===== -->
<div id="settings-overlay" class="hidden"></div>
<div id="settings-panel" class="hidden">
  <div id="settings-panel-header">
    <span>설정</span>
    <button id="settings-close">✕</button>
  </div>
  <div id="settings-menu">
    <button class="settings-menu-item" id="menu-repeats">
      <span class="settings-menu-icon">🔁</span>
      <span class="settings-menu-label">반복함</span>
      <span class="settings-menu-arrow">›</span>
    </button>
    <button class="settings-menu-item" id="menu-theme">
      <span class="settings-menu-icon">🎨</span>
      <span class="settings-menu-label">테마</span>
      <span class="settings-menu-arrow">›</span>
    </button>
    <button class="settings-menu-item" id="menu-stats">
      <span class="settings-menu-icon">📊</span>
      <span class="settings-menu-label">통계</span>
      <span class="settings-menu-arrow">›</span>
    </button>
    <button class="settings-menu-item" id="menu-logout">
      <span class="settings-menu-icon">🚪</span>
      <span class="settings-menu-label">로그아웃</span>
    </button>
  </div>
</div>

<!-- ===== 반복함 패널 ===== -->
<div id="repeats-panel" class="hidden">
  <div id="repeats-panel-header">
    <button id="repeats-back">‹</button>
    <span>반복함</span>
  </div>
  <div id="repeats-list"></div>

/* ── PC: 메모 URL 링크 미리보기 ── */
function pcUpdateMemoLinks() {
  const memo = document.getElementById('input-memo');
  if (!memo) return;

  let linkBox = document.getElementById('pc-memo-links');

  const urlRegex = /https?:\/\/[^\s\n"'<>]+/g;
  const urls = (memo.value || '').match(urlRegex);

  if (!urls || urls.length === 0) {
    if (linkBox) linkBox.style.display = 'none';
    return;
  }

  if (!linkBox) {
    linkBox = document.createElement('div');
    linkBox.id = 'pc-memo-links';
    linkBox.style.cssText = `
      padding: 6px 12px 2px;
      display: flex; flex-direction: column; gap: 4px;
    `;
    // 메모 행 바로 뒤, 날짜 행 앞에 삽입
    const memoRow = memo.closest('.detail-row');
    if (memoRow && memoRow.nextElementSibling) {
      memoRow.parentNode.insertBefore(linkBox, memoRow.nextElementSibling);
    }
  }

  linkBox.innerHTML = '';
  linkBox.style.display = 'flex';

  // 중복 제거
  [...new Set(urls)].forEach(url => {
    const a = document.createElement('a');

    a.textContent = url.length > 50 ? url.slice(0, 50) + '…' : url;
    a.style.cssText = `
      font-size: 12px;
      color: var(--accent);
      text-decoration: underline;
      word-break: break-all;

/* 모달 닫힐 때 링크 박스 제거 */
(function() {

document.addEventListener('DOMContentLoaded', () => {
  // modal.js가 #input-memo를 동적으로 사용하므로, 이벤트는 document에서 위임
  document.addEventListener('keydown', function(e) {
    const el = e.target;
    if (el.id !== 'input-memo') return;

    if (e.key === ' ') {
      // "숫자." + 스페이스 → 번호 리스트 시작
      const val = el.value;
      const pos = el.selectionStart;
      const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
      const lineText  = val.substring(lineStart, pos);
      if (/^\d+\.$/.test(lineText)) {
        e.preventDefault();
        // 이전 번호 줄 기준으로 다음 번호 결정 (빈 줄 건너뜀)
        const prevLines = val.substring(0, lineStart).split('\n');
        let prevMatch = null;
        for (let k = prevLines.length - 1; k >= 0; k--) {
          const m = prevLines[k].match(/^ {4}(\d+)\. /);
          if (m) { prevMatch = m; break; }
        }
        const num = prevMatch ? parseInt(prevMatch[1]) + 1 : parseInt(lineText);
        const prefix = `${num}. `;
        const indent = '    '; // 들여쓰기 4칸
        const newLine = indent + prefix;
        // 현재 줄을 들여쓰기+번호로 교체
        const before = val.substring(0, lineStart);
        const after  = val.substring(pos);
        el.value = before + newLine + after;
        el.selectionStart = el.selectionEnd = lineStart + newLine.length;
      }
    }

    if (e.key === 'Enter') {
      const val = el.value;
      const pos = el.selectionStart;
      const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
      const lineText  = val.substring(lineStart, pos);

      // 들여쓰기된 번호 줄인지 확인: "    N. 내용"
      const match = lineText.match(/^( {4})(\d+)\. (.*)/);
      if (!match) return;

      e.preventDefault();
      const indent  = match[1];
      const num     = parseInt(match[2]);
      const content = match[3];

      if (content === '') {
        // 빈 번호 줄 → 번호 제거하고 리스트 종료
        const before = val.substring(0, lineStart);
        const after  = val.substring(pos);
        el.value = before + after;
        el.selectionStart = el.selectionEnd = lineStart;
      } else {
        // 내용 있는 줄 → 다음 번호 생성
        const nextPrefix = `${indent}${num + 1}. `;
        const before = val.substring(0, pos);
        const after  = val.substring(pos);
        el.value = before + '\n' + nextPrefix + after;
        el.selectionStart = el.selectionEnd = pos + 1 + nextPrefix.length;
      }
    }
  });
});

/* ── 메모 자동 번호 재정렬 (삭제 시) ── */
(function() {
  function _renumberLines(text) {
    const lines = text.split('\n');
    let changed = false;
    let i = 0;
    while (i < lines.length) {
      if (/^ {4}\d+\. /.test(lines[i])) {
        const startNum = parseInt(lines[i].match(/^ {4}(\d+)\. /)[1]);
        let j = i, counter = startNum;
        while (j < lines.length && /^ {4}\d+\. /.test(lines[j])) {
          const newLine = lines[j].replace(/^( {4})\d+(\. )/, '$1' + counter + '$2');
          if (newLine !== lines[j]) { lines[j] = newLine; changed = true; }
          counter++;
          j++;
        }
        i = j;
      } else {
        i++;
      }
    }
    return changed ? lines.join('\n') : text;
  }

  document.addEventListener('input', function(e) {
    const el = e.target;
    if (el.id !== 'input-memo') return;
    const val = el.value;
    const renum = _renumberLines(val);
    if (renum !== val) {
      const s = el.selectionStart;
      el.value = renum;
      el.selectionStart = el.selectionEnd = s;
    }
  });
})();

      const cell = document.createElement('button');
      cell.textContent = d;
      const isToday    = dateStr === todayStr2;
      const isSelected = dateStr === highlightDate;
      const dow = new Date(pickerYear, pickerMonth - 1, d).getDay();
      const color = dow === 0 ? 'var(--danger)' : dow === 6 ? '#6b9fd4' : 'var(--text-primary)';
      cell.style.cssText = `
        aspect-ratio:1;width:100%;border:none;cursor:pointer;border-radius:50%;
        font-size:16px;font-weight:${isToday||isSelected?'700':'400'};
        background:${isSelected?'var(--accent)':isToday?'var(--accent-glow)':'none'};
        color:${isSelected?'#1a1a2e':color};
        display:flex;align-items:center;justify-content:center;transition:background 0.12s;
      `;
      cell.addEventListener('mouseover', () => { if (!isSelected) cell.style.background = 'var(--bg-hover)'; });
      cell.addEventListener('mouseout',  () => { if (!isSelected) cell.style.background = isToday ? 'var(--accent-glow)' : 'none'; });
      cell.addEventListener('click', async (e) => {
        e.stopPropagation();
        popup.remove();
        try {
          if (typeof onSelect === 'function') {
            // 창고 등 다른 용도: 커스텀 콜백 사용
            await onSelect(dateStr);
          } else {
            // 기존 할일/주간 기본 동작 (변경 없음)
            await moveTodoDate(id, dateStr);
            showToast('날짜를 변경했어요');
            if (fromWeekly) await loadWeekly();
            else { await loadTodos(); updateMonthDots(); }
          }
        } catch(e2) { showToast('오류가 발생했어요'); }
      });
      grid.appendChild(cell);
    }
    popup.appendChild(grid);
  }

  renderPicker();
  document.body.appendChild(popup);
  setTimeout(() => {
    document.addEventListener('click', function outsideClose(e) {
      if (!popup.contains(e.target)) {
        popup.remove();
        document.removeEventListener('click', outsideClose);
      }
    });
  }, 10);
}

</script>


<script>
/* ── 날씨 표시 (Open-Meteo, 세종시 고정) ── */
(function() {
  const LAT = 36.48, LON = 127.29;
  const WMO = {
    0:'☀️',1:'🌤️',2:'⛅',3:'☁️',
    45:'🌫️',48:'🌫️',
    51:'🌧️',53:'🌧️',55:'🌧️',
    61:'🌧️',63:'🌧️',65:'🌧️',
    71:'❄️',73:'❄️',75:'❄️',77:'❄️',
    80:'🌦️',81:'🌦️',82:'🌦️',
    85:'🌨️',86:'🌨️',
    95:'⛈️',96:'⛈️',99:'⛈️'
  };
  function wIcon(code) { return WMO[code] || '🌡️'; }
  async function fetchWeather() {
    try {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + LAT +
        '&longitude=' + LON +
        '&daily=temperature_2m_max,temperature_2m_min,weathercode' +
        '&timezone=Asia%2FSeoul&forecast_days=1';
      const res = await fetch(url);
      const data = await res.json();
      const max  = Math.round(data.daily.temperature_2m_max[0]);
      const min  = Math.round(data.daily.temperature_2m_min[0]);
      const icon = wIcon(data.daily.weathercode[0]);
      const el = document.getElementById('weather-display');
      if (el) el.textContent = icon + ' ' + min + '°/' + max + '°';
    } catch(e) {}
  }
  document.addEventListener('DOMContentLoaded', () => { setTimeout(fetchWeather, 1500); });
})();
</script>
